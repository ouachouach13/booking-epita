name: pullrequest

on:
  pull_request:

permissions:
  actions: read
  security-events: write
  contents: read

jobs:
  DependenciesAnalysis:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: run osv-scanner (after PR)
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --format=json
            --output=DependenciesAnalysisAfter.json
            ./
        continue-on-error: true

      - name: checkout baseline commit
        run: |
          git checkout ${{ github.event.pull_request.base.sha }}

      - name: run osv-scanner (before PR)
        uses: google/osv-scanner-action/osv-scanner-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --format=json
            --output=DependenciesAnalysisBefore.json
            ./
        continue-on-error: true

      - name: Compare analysis
        uses: google/osv-scanner-action/osv-reporter-action@7222d1c7ee4f96d71d883e0d3c603f1e1705eca9
        with:
          scan-args: |-
            --new=DependenciesAnalysisAfter.json
            --old=DependenciesAnalysisBefore.json
            --output=DependenciesAnalysisDiff.sarif
            --gh-annotations=false
            --fail-on-vuln=true

      - name: Save differential report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: DependenciesAnalysisDiff
          path: DependenciesAnalysisDiff.sarif

  SourceCodeAnalysis:
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run differential analysis with semgrep
        run: semgrep scan --config .semgrep --error --sarif --output SourceCodeAnalysisDiff.sarif --baseline-commit ${{ github.event.pull_request.base.sha }} .

      - name: Save differential report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SourceCodeAnalysisDiff
          path: SourceCodeAnalysisDiff.sarif
